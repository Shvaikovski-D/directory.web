services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: directory-web-app-dev
    ports:
      - "8383:8080"
    env_file:
      - .env.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge