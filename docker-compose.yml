services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: directory-web-app
    ports:
      - "8383:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      # Строка подключения к внешней базе данных PostgreSQL
      - ConnectionStrings__directory.webDb=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge